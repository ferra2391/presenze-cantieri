<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyXTjr_-xYZ5ipKbcj2-PjGb_fqmr9ty2XT0HL241_-CK3fzk0Wj56IJXJKG3f2_FC4Gw/exec";
  const GITHUB_OPERAI_BASE = "https://raw.githubusercontent.com/ferra2391/presenze-cantieri/main/operai/";

  const state = {
    workers: [],
    sites: [],
    tasksBySite: {},
    assignmentsBySite: {},
    targetDate: null,
    dragWorkerName: null
  };

  const $ = sel => document.querySelector(sel);
  const workersGrid = $('#workersGrid');
  const cantiereGrid = $('#cantiereGrid');
  const statusEl = $('#status');
  const badgeTarget = $('#badgeTarget');
  const badgeStats = $('#badgeStats');
  const workerSearch = $('#workerSearch');
  const siteSearch = $('#siteSearch');
  const overlay = $('#overlay');
  const modalTodo = $('#modalTodo');

  function pad(n){ return String(n).padStart(2,'0'); }

  function normalize(s){
    return String(s || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'')
      .trim()
      .toLowerCase();
  }

  function escapeHtml(s){
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function nextDayISO(){
    const d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + 1);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function formatDateIT(iso){
    if(!iso) return '—';
    const [y,m,d] = String(iso).split('-').map(Number);
    return new Date(y, m-1, d).toLocaleDateString('it-IT', {
      weekday:'long',
      day:'2-digit',
      month:'long',
      year:'numeric'
    });
  }

  function photoUrlForWorker(name, explicitUrl){
    if(explicitUrl) return explicitUrl;
    return `${GITHUB_OPERAI_BASE}${encodeURIComponent(String(name || '').trim())}.png`;
  }

  function jsStr(v){
    return JSON.stringify(String(v || ''));
  }

  function allAssignedNames(){
    const out = new Set();
    Object.values(state.assignmentsBySite || {}).forEach(arr => {
      (arr || []).forEach(name => out.add(String(name)));
    });
    return out;
  }

  function workerImage(url, name){
    return `<img class="worker-avatar" src="${escapeHtml(url)}" alt="${escapeHtml(name)}" onerror="this.onerror=null;this.src='https://via.placeholder.com/90?text=%F0%9F%91%B7'">`;
  }

  function miniImage(url, name){
    return `<img class="mini-avatar" src="${escapeHtml(url)}" alt="${escapeHtml(name)}" onerror="this.onerror=null;this.src='https://via.placeholder.com/40?text=%F0%9F%91%B7'">`;
  }

  function labelPriority(v){
    if(String(v) === '1') return 'Urgente';
    if(String(v) === '2') return 'Media';
    return 'Minima';
  }

  function priorityClass(v){
    if(String(v) === '1') return 'rosso';
    if(String(v) === '2') return 'arancione';
    return 'bianco';
  }

  function updateHeader(){
    state.targetDate = nextDayISO();
    $('#pageTitle').textContent = `🚚 Smistamento Operai — giorno ${formatDateIT(state.targetDate)}`;
    $('#pageSubtitle').textContent = 'Pianificazione del giorno successivo. Le assegnazioni vengono lette e salvate sulla data di domani.';
    badgeTarget.textContent = `Giorno operativo: ${formatDateIT(state.targetDate)}`;
  }

  function snapshotKey(targetDate){
    return `smistamento_snapshot_${targetDate}`;
  }

  function saveSnapshot(){
    try {
      const payload = {
        workers: state.workers,
        sites: state.sites,
        tasksBySite: state.tasksBySite,
        assignmentsBySite: state.assignmentsBySite,
        savedAt: Date.now()
      };
      localStorage.setItem(snapshotKey(state.targetDate), JSON.stringify(payload));
    } catch(e) {}
  }

  function loadSnapshot(targetDate){
    try {
      const raw = localStorage.getItem(snapshotKey(targetDate));
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      if(!parsed || typeof parsed !== 'object') return null;
      return parsed;
    } catch(e) {
      return null;
    }
  }

  function applyServerPayload(json){
    state.workers = Array.isArray(json.workers)
      ? json.workers.map(w => ({
          name: String(w.name || '').trim(),
          photoUrl: photoUrlForWorker(w.name, w.photoUrl || ''),
          role: String(w.role || '').trim()
        })).filter(w => w.name)
      : [];

    state.sites = Array.isArray(json.sites)
      ? json.sites.map(String).filter(Boolean)
      : [];

    state.tasksBySite = json.tasksBySite || {};
    state.assignmentsBySite = json.assignmentsBySite || {};

    state.sites.forEach(siteName => {
      if(!Array.isArray(state.assignmentsBySite[siteName])) state.assignmentsBySite[siteName] = [];
      if(!Array.isArray(state.tasksBySite[siteName])) state.tasksBySite[siteName] = [];
    });

    saveSnapshot();
  }

  function applySnapshot(snapshot){
    state.workers = Array.isArray(snapshot.workers) ? snapshot.workers : [];
    state.sites = Array.isArray(snapshot.sites) ? snapshot.sites : [];
    state.tasksBySite = snapshot.tasksBySite || {};
    state.assignmentsBySite = snapshot.assignmentsBySite || {};

    state.sites.forEach(siteName => {
      if(!Array.isArray(state.assignmentsBySite[siteName])) state.assignmentsBySite[siteName] = [];
      if(!Array.isArray(state.tasksBySite[siteName])) state.tasksBySite[siteName] = [];
    });
  }

  async function apiGet(action, params = {}){
    const qs = new URLSearchParams({ action, ...params });
    const res = await fetch(`${GAS_URL}?${qs.toString()}`, { cache:'no-store' });
    return await res.json();
  }

  async function apiPost(payload){
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
  }

  function setStatus(msg, type='ok'){
    statusEl.innerHTML = `<span class="${type}">${msg}</span>`;
  }

  async function loadAll(forceServer = false){
    updateHeader();

    if(!forceServer){
      const snap = loadSnapshot(state.targetDate);
      if(snap){
        applySnapshot(snap);
        renderAll();
        setStatus('⚡ Dati locali caricati. Allineo dal server...', 'ok');
      } else {
        setStatus('⏳ Caricamento smistamento...', 'ok');
      }
    } else {
      setStatus('⏳ Caricamento smistamento...', 'ok');
    }

    try {
      const json = await apiGet('initSmistamento', { targetDate: state.targetDate });
      applyServerPayload(json);
      renderAll();
      setStatus('✓ Smistamento caricato.', 'ok');
    } catch (err) {
      console.error(err);
      if(!state.sites.length && !state.workers.length){
        setStatus('✗ Errore nel caricamento dei dati.', 'error');
      } else {
        setStatus('⚠️ Server lento o non raggiungibile. Sto usando i dati locali già presenti.', 'error');
      }
    }
  }

  function renderWorkers(){
    const q = normalize(workerSearch.value);
    const assigned = allAssignedNames();

    const list = state.workers
      .filter(w => !q || normalize(w.name).includes(q))
      .sort((a,b) => a.name.localeCompare(b.name, 'it'));

    workersGrid.innerHTML = '';

    if(!list.length){
      workersGrid.innerHTML = `<div class="muted">Nessun operaio trovato.</div>`;
      return;
    }

    list.forEach(w => {
      const isAssigned = assigned.has(w.name);
      const div = document.createElement('div');
      div.className = `worker-chip${isAssigned ? ' assigned' : ''}`;
      div.draggable = true;
      div.dataset.workerName = w.name;

      div.innerHTML = `
        <div class="worker-x">✕</div>
        ${workerImage(w.photoUrl, w.name)}
        <div class="worker-meta">
          <div class="worker-name">${escapeHtml(w.name)}</div>
          <div class="worker-sub">${isAssigned ? 'Già assegnato' : 'Disponibile'}</div>
        </div>
      `;

      div.addEventListener('dragstart', () => {
        state.dragWorkerName = w.name;
        div.classList.add('dragging');
      });

      div.addEventListener('dragend', () => {
        state.dragWorkerName = null;
        div.classList.remove('dragging');
      });

      workersGrid.appendChild(div);
    });

    badgeStats.textContent = `Operai assegnati: ${assigned.size}`;
  }

  function renderSites(){
    const q = normalize(siteSearch.value);
    const sites = state.sites.filter(name => !q || normalize(name).includes(q));

    cantiereGrid.innerHTML = '';

    if(!sites.length){
      cantiereGrid.innerHTML = `<div class="muted">Nessun cantiere trovato.</div>`;
      return;
    }

    sites.forEach(siteName => {
      const assigned = Array.isArray(state.assignmentsBySite[siteName]) ? state.assignmentsBySite[siteName] : [];
      const tasks = Array.isArray(state.tasksBySite[siteName]) ? state.tasksBySite[siteName] : [];

      const assignedHtml = assigned.length
        ? assigned.map(name => {
            const worker = state.workers.find(w => w.name === name) || {
              name,
              photoUrl: photoUrlForWorker(name)
            };

            return `
              <div class="assigned-item">
                <div class="assigned-left">
                  ${miniImage(worker.photoUrl, worker.name)}
                  <div class="assigned-name">${escapeHtml(worker.name)}</div>
                </div>
                <button class="icon-btn" title="Rimuovi assegnazione" onclick='removeWorkerFromSite(${jsStr(siteName)}, ${jsStr(name)})'>✕</button>
              </div>
            `;
          }).join('')
        : `<div class="assigned-empty">Nessun operaio assegnato.</div>`;

      const taskHtml = tasks.length
        ? tasks.map(t => `
            <div class="todo-item priority-${priorityClass(t.priority)}">
              <div class="todo-top">
                <div class="todo-text">${escapeHtml(t.text)}</div>
                <div class="todo-actions">
                  <button class="icon-btn" title="Modifica" onclick='openEditTask(${jsStr(siteName)}, ${jsStr(t.row)})'>✏️</button>
                  <button class="icon-btn" title="Completa" onclick='closeTask(${jsStr(siteName)}, ${jsStr(t.row)})'>🗑️</button>
                </div>
              </div>
              <div class="todo-meta">
                <span><span class="priority-dot ${priorityClass(t.priority)}"></span>${labelPriority(t.priority)}</span>
                <span>Creata: ${escapeHtml(t.createdAt || '')}</span>
                ${t.temp ? '<span>Da riallineare</span>' : ''}
              </div>
            </div>
          `).join('')
        : `<div class="todo-empty">Nessuna lavorazione aperta.</div>`;

      const card = document.createElement('div');
      card.className = 'site-card';
      card.innerHTML = `
        <div class="site-head">
          <div class="site-name">${escapeHtml(siteName)}</div>
          <span class="badge">${tasks.length} lavorazioni</span>
        </div>

        <div class="site-dropzone" data-site-name="${escapeHtml(siteName)}">
          <div class="drop-hint">Trascina qui l'operaio</div>
          <div class="assigned-list">${assignedHtml}</div>
        </div>

        <div class="todo-form">
          <textarea placeholder="Nuova lavorazione..." data-task-input="${escapeHtml(siteName)}"></textarea>
          <select data-priority-input="${escapeHtml(siteName)}">
            <option value="1">🔴 Urgente</option>
            <option value="2">🟠 Media</option>
            <option value="3">⚪ Minima</option>
          </select>
          <button class="primary" onclick='createTask(${jsStr(siteName)})'>Aggiungi</button>
        </div>

        <div class="todo-list">${taskHtml}</div>
      `;

      cantiereGrid.appendChild(card);
    });

    bindDropzones();
  }

  function bindDropzones(){
    document.querySelectorAll('.site-dropzone').forEach(zone => {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('over');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('over');
      });

      zone.addEventListener('drop', async e => {
        e.preventDefault();
        zone.classList.remove('over');

        const siteName = zone.dataset.siteName;
        if(!siteName || !state.dragWorkerName) return;

        await addWorkerToSite(state.dragWorkerName, siteName);
      });
    });
  }

  function renderAll(){
    renderWorkers();
    renderSites();
  }

  async function persistSiteWorkers(siteName, workers){
    await apiPost({
      action: 'setSiteWorkers',
      targetDate: state.targetDate,
      siteName,
      workers
    });
  }

  async function addWorkerToSite(workerName, siteName){
    const current = JSON.parse(JSON.stringify(state.assignmentsBySite || {}));

    const alreadyElsewhere = Object.entries(current).some(([site, arr]) => {
      return site !== siteName && (arr || []).includes(workerName);
    });

    if(alreadyElsewhere){
      setStatus('⚠️ Questo operaio è già assegnato a un altro cantiere per il giorno selezionato.', 'error');
      return;
    }

    current[siteName] = Array.isArray(current[siteName]) ? current[siteName] : [];
    if(current[siteName].includes(workerName)) return;

    current[siteName].push(workerName);
    current[siteName].sort((a,b) => a.localeCompare(b, 'it'));

    state.assignmentsBySite = current;
    saveSnapshot();
    renderAll();

    setStatus('⏳ Salvataggio assegnazione...', 'ok');
    await persistSiteWorkers(siteName, current[siteName]);
    setStatus('✓ Operaio assegnato.', 'ok');
  }

  async function removeWorkerFromSite(siteName, workerName){
    const current = JSON.parse(JSON.stringify(state.assignmentsBySite || {}));
    current[siteName] = (current[siteName] || []).filter(n => n !== workerName);

    state.assignmentsBySite = current;
    saveSnapshot();
    renderAll();

    setStatus('⏳ Rimozione assegnazione...', 'ok');
    await persistSiteWorkers(siteName, current[siteName]);
    setStatus('✓ Assegnazione rimossa.', 'ok');
  }

  async function createTask(siteName){
    const txtEl = document.querySelector(`[data-task-input="${CSS.escape(siteName)}"]`);
    const prEl = document.querySelector(`[data-priority-input="${CSS.escape(siteName)}"]`);
    const text = (txtEl?.value || '').trim();
    const priority = (prEl?.value || '3').trim();

    if(!text){
      setStatus('⚠️ Inserisci la lavorazione.', 'error');
      return;
    }

    const fakeRow = `tmp_${Date.now()}`;

    state.tasksBySite[siteName] = Array.isArray(state.tasksBySite[siteName]) ? state.tasksBySite[siteName] : [];
    state.tasksBySite[siteName].unshift({
      row: fakeRow,
      createdAt: new Date().toLocaleString('it-IT'),
      text,
      priority,
      temp: true
    });

    txtEl.value = '';
    saveSnapshot();
    renderSites();

    setStatus('⏳ Salvataggio lavorazione...', 'ok');
    await apiPost({
      action: 'createTask',
      siteName,
      text,
      priority
    });

    setStatus('✓ Lavorazione aggiunta. Premi "Carica dati" quando vuoi riallineare dal foglio.', 'ok');
  }

  function openEditTask(siteName, row){
    const arr = Array.isArray(state.tasksBySite[siteName]) ? state.tasksBySite[siteName] : [];
    const task = arr.find(t => String(t.row) === String(row));
    if(!task) return;

    if(task.temp){
      setStatus('⚠️ Questa lavorazione è appena stata creata. Premi prima "Carica dati" per riallineare il foglio.', 'error');
      return;
    }

    $('#editSiteId').value = siteName;
    $('#editId').value = row;
    $('#editTaskText').value = task.text || '';
    $('#editPriority').value = String(task.priority || '3');
    $('#editWorkers').value = (state.assignmentsBySite[siteName] || []).join(', ');

    overlay.style.display = 'block';
    modalTodo.style.display = 'block';
  }

  function closeModal(){
    overlay.style.display = 'none';
    modalTodo.style.display = 'none';
  }

  async function saveTaskEdit(){
    const siteName = $('#editSiteId').value;
    const row = String($('#editId').value || '');
    const text = $('#editTaskText').value.trim();
    const priority = $('#editPriority').value;

    if(!siteName || !row || !text){
      setStatus('⚠️ Dati lavorazione incompleti.', 'error');
      return;
    }

    const arr = Array.isArray(state.tasksBySite[siteName]) ? state.tasksBySite[siteName] : [];
    const task = arr.find(t => String(t.row) === String(row));
    if(task){
      task.text = text;
      task.priority = priority;
    }

    closeModal();
    saveSnapshot();
    renderSites();

    setStatus('⏳ Aggiornamento lavorazione...', 'ok');

    await apiPost({
      action: 'updateTask',
      siteName,
      row,
      text,
      priority
    });

    setStatus('✓ Lavorazione aggiornata.', 'ok');
  }

  async function closeTask(siteName, row){
    const arr = Array.isArray(state.tasksBySite[siteName]) ? state.tasksBySite[siteName] : [];
    const idx = arr.findIndex(t => String(t.row) === String(row));
    if(idx < 0) return;

    if(arr[idx].temp){
      setStatus('⚠️ Questa lavorazione è appena stata creata. Premi prima "Carica dati" per riallineare il foglio.', 'error');
      return;
    }

    arr.splice(idx, 1);
    state.tasksBySite[siteName] = arr;

    saveSnapshot();
    renderSites();

    setStatus('⏳ Chiusura lavorazione...', 'ok');

    await apiPost({
      action: 'closeTask',
      siteName,
      row
    });

    setStatus('✓ Lavorazione chiusa.', 'ok');
  }

  workerSearch.addEventListener('input', renderWorkers);
  siteSearch.addEventListener('input', renderSites);

  $('#btnReload').addEventListener('click', () => loadAll(true));

  $('#btnResetDay').addEventListener('click', async () => {
    if(!confirm(`Confermi il reset assegnazioni del ${formatDateIT(state.targetDate)}?`)) return;

    state.assignmentsBySite = {};
    saveSnapshot();
    renderAll();

    setStatus('⏳ Reset assegnazioni...', 'ok');
    await apiPost({
      action:'resetSiteWorkers',
      targetDate: state.targetDate
    });
    setStatus('✓ Giornata resettata.', 'ok');
  });

  $('#btnCloseModal').addEventListener('click', closeModal);
  $('#btnSaveEdit').addEventListener('click', saveTaskEdit);
  overlay.addEventListener('click', closeModal);

  window.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });

  setInterval(() => {
    const next = nextDayISO();
    if(state.targetDate !== next){
      updateHeader();
      setStatus('ℹ️ È cambiato il giorno operativo. Premi "Carica dati" per riallineare.', 'ok');
    }
  }, 60 * 1000);

  window.createTask = createTask;
  window.openEditTask = openEditTask;
  window.closeTask = closeTask;
  window.removeWorkerFromSite = removeWorkerFromSite;

  loadAll(false);
</script>
